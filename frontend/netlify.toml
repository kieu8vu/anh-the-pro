# netlify.toml — Cấu hình deploy Frontend lên Netlify (Bước 5)
# ================================================================

[build]
  publish = "."        # thư mục frontend (không build step vì Vanilla JS)
  # Nếu dùng Vite/React thì đổi thành: publish = "dist", command = "npm run build"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
